name: lovepin
description: >-
  Lovepin — A couple-only home screen widget messaging app.
  Send short texts, love quotes, or photo captions that appear
  directly on your partner's home screen widget.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Backend — Supabase
  supabase_flutter: ^2.8.2

  # Home screen widget
  home_widget: ^0.7.0

  # Image handling
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Push notifications
  firebase_core: ^3.9.0
  firebase_messaging: ^15.1.6

  # UI & design
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  gap: ^3.0.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_dotenv: ^5.2.1
  path_provider: ^2.1.5
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0

  # Linting
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
